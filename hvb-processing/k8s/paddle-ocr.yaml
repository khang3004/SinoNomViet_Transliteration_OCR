apiVersion: v1
kind: Namespace
metadata:
  name: ocr
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hvb-paddle-ocr
  namespace: ocr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hvb-paddle-ocr
  template:
    metadata:
      labels:
        app: hvb-paddle-ocr
    spec:
      containers:
        - name: paddle-ocr
          image: hvb-paddle-ocr:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: hvb-paddle-ocr
  namespace: ocr
spec:
  selector:
    app: hvb-paddle-ocr
  ports:
    - port: 8080
      targetPort: 8080
