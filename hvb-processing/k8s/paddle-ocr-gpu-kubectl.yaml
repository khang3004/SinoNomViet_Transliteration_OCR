apiVersion: v1
kind: Namespace
metadata:
  name: ocr
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hvb-paddle-ocr
  namespace: ocr
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: hvb-paddle-ocr
  template:
    metadata:
      labels:
        app: hvb-paddle-ocr
    spec:
      runtimeClassName: nvidia
      # Spread replicas across GPU nodes when possible / Ưu tiên mỗi replica một node GPU
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: hvb-paddle-ocr
                topologyKey: kubernetes.io/hostname
      containers:
        - name: paddle-ocr
          image: python:3.10-slim
          imagePullPolicy: IfNotPresent
          env:
            - name: PADDLE_OCR_PORT
              value: "8080"
            - name: PADDLE_DEVICE
              value: "gpu"
            - name: PADDLE_OCR_TIER
              value: "server"
            - name: PADDLE_LATIN_ENABLED
              value: "false"
            - name: PADDLE_LATIN_LANG
              value: "vi"
            - name: PADDLE_GPU_ID
              value: "0"
            - name: PADDLE_PREPROCESS
              value: "clahe"
            - name: PADDLE_MAX_IMAGE_SIDE
              value: "2560"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
          command: ["/bin/bash", "/app/start.sh"]
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
              nvidia.com/gpu: "1"
            limits:
              memory: "8Gi"
              cpu: "2"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: app-src
              mountPath: /app
            - name: paddlex-cache
              mountPath: /root/.paddlex
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            failureThreshold: 150
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: app-src
          configMap:
            name: hvb-paddle-ocr-app
            defaultMode: 0755
        - name: paddlex-cache
          emptyDir:
            sizeLimit: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: hvb-paddle-ocr
  namespace: ocr
spec:
  selector:
    app: hvb-paddle-ocr
  ports:
    - port: 8080
      targetPort: 8080
