# Local dev stack (AGENTS.md §8). K8s is FUTURE/out of scope — no YAML manifests.
# Two decoupled services sharing the ./data volume (jobs.db + uploads + output).
#
# Usage:
#   docker compose up --build          # CPU OCR, no API key needed
#   open http://localhost:8000
#
# Optional: create a .env with GOOGLE_API_KEY and set TRANSLATE_BACKEND=api /
# CORRECT_BACKEND=api to enable Gemini translation/correction.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "8000:8000"
    environment:
      DATA_DIR: /data
    volumes:
      - ./data:/data
    # The app is stateless and needs NO API keys (AGENTS.md §7).
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATA_DIR: /data
      DICTS_DIR: /dicts
      OCR_BACKEND: ${OCR_BACKEND:-paddle}
      OCR_USE_GPU: ${OCR_USE_GPU:-0}          # 0 = CPU (default); 1 = GPU (see below)
      OCR_LANG: ${OCR_LANG:-chinese_cht}      # Traditional — best for Sino-Nom
      TRANSLATE_BACKEND: ${TRANSLATE_BACKEND:-skip}   # set "api" + GOOGLE_API_KEY for Gemini
      CORRECT_BACKEND: ${CORRECT_BACKEND:-skip}
      DSG_FFF: ${DSG_FFF:-HVB_001}
      PDF_DPI: ${PDF_DPI:-300}
    # Optional secrets (Gemini etc). Won't fail if .env is absent.
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/data
      - ./dicts:/dicts:ro
    restart: unless-stopped
    # --- GPU (GTX 2060) — to run PaddleOCR on the GPU: install the NVIDIA
    # Container Toolkit, set OCR_USE_GPU=1, swap Dockerfile.worker's paddle wheel
    # to a CUDA build (…/stable/cu118/  paddlepaddle-gpu==2.6.1), and uncomment: ---
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

# State (jobs.db, uploads/, output/) lives in this bind-mounted volume, not in
# the containers — exactly what makes a future K8s PVC move trivial.
