# Local dev stack (AGENTS.md §8). K8s is FUTURE/out of scope — no YAML manifests.
# Three services: postgres (queue + records + users), app (FastAPI UI), worker
# (OCR). app + worker share the ./data bind mount for uploads/page images and
# Postgres for all state (jobs, records, users, assignments).
#
# Usage:
#   docker compose up --build          # CPU OCR, no API key needed
#   open http://localhost:8000
#
# Secrets (AUTH_SECRET, ADMIN_PASSWORD, optional GOOGLE_API_KEY) come from a .env
# file (untracked). See .env.example.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hannom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hannom}
      POSTGRES_DB: ${POSTGRES_DB:-hannom}
    # Bind to localhost only so DBeaver/psql on the host can connect, without
    # exposing the DB to the internet. Safe to keep in production too.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hannom} -d ${POSTGRES_DB:-hannom}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "8000:8000"
    environment:
      DATA_DIR: /data
      DATABASE_URL: postgresql://${POSTGRES_USER:-hannom}:${POSTGRES_PASSWORD:-hannom}@postgres:5432/${POSTGRES_DB:-hannom}
      AUTH_SECRET: ${AUTH_SECRET:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-0}      # set 1 when served over HTTPS (Caddy)
    # Secrets (AUTH_SECRET, ADMIN_PASSWORD). Won't fail if .env is absent.
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/data
      # Live source mounts: code edits apply on restart, and app/worker always
      # run the SAME pipeline code (no per-image rebuild for code changes).
      - ./pipeline:/srv/pipeline:ro
      - ./app:/srv/app:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATA_DIR: /data
      DATABASE_URL: postgresql://${POSTGRES_USER:-hannom}:${POSTGRES_PASSWORD:-hannom}@postgres:5432/${POSTGRES_DB:-hannom}
      DICTS_DIR: /dicts
      OCR_BACKEND: ${OCR_BACKEND:-paddle}
      OCR_USE_GPU: ${OCR_USE_GPU:-0}          # 0 = CPU (default); 1 = GPU (see below)
      OCR_LANG: ${OCR_LANG:-chinese_cht}      # Traditional — best for Sino-Nom
      OCR_LANG_VN: ${OCR_LANG_VN:-vi}         # 2nd engine for "Re-OCR Việt" (lazy)
      TRANSLATE_BACKEND: ${TRANSLATE_BACKEND:-skip}   # set "api" + GOOGLE_API_KEY for Gemini
      CORRECT_BACKEND: ${CORRECT_BACKEND:-skip}
      DSG_FFF: ${DSG_FFF:-HVB_001}
      PDF_DPI: ${PDF_DPI:-300}
    # Optional secrets (Gemini etc). Won't fail if .env is absent.
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/data
      - ./dicts:/dicts:ro
      - ./pipeline:/srv/pipeline:ro
      - ./worker:/srv/worker:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # --- GPU (GTX 2060) — to run PaddleOCR on the GPU: install the NVIDIA
    # Container Toolkit, set OCR_USE_GPU=1, swap Dockerfile.worker's paddle wheel
    # to a CUDA build (…/stable/cu118/  paddlepaddle-gpu==2.6.1), and uncomment: ---
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  pgdata:   # Postgres data (queue + records + users). Real Linux FS via named volume.

# Files (uploads/, output/ JSONL + page images) live in the bind-mounted ./data
# so the host can read them; all structured state lives in Postgres.
