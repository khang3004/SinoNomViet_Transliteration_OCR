<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>hannom-app — Han-Nom OCR corpus builder</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; margin: 2rem auto; max-width: 880px; color: #1c1c1c; }
    h1 { font-size: 1.4rem; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; }
    label { display: block; margin: 0.5rem 0 0.25rem; font-weight: 600; font-size: 0.9rem; }
    input, select, button { font-size: 0.95rem; padding: 0.4rem; }
    button { background: #b3122a; color: #fff; border: 0; border-radius: 6px; padding: 0.5rem 1rem; cursor: pointer; }
    button:hover { background: #8f0e21; }
    table { border-collapse: collapse; width: 100%; font-size: 0.85rem; }
    th, td { border-bottom: 1px solid #eee; text-align: left; padding: 0.4rem 0.5rem; }
    .status { font-weight: 600; }
    .pending { color: #b07900; } .running { color: #1565c0; }
    .done { color: #2e7d32; } .failed { color: #c62828; }
    a { color: #b3122a; }
    .muted { color: #777; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>🏮 hannom-app — Han-Nom OCR corpus builder</h1>
  <p class="muted">Upload a Châu bản page (image now; text-layer PDF later). The worker
    extracts parallel Han · Vietnamese records into JSONL.</p>

  <div class="card">
    <h2 style="font-size:1.05rem">Upload</h2>
    <form id="form">
      <label for="file">Document (image or PDF)</label>
      <input id="file" name="file" type="file" accept=".png,.jpg,.jpeg,.tif,.tiff,.pdf" required />
      <label for="source_doc">Source doc hint (optional)</label>
      <input id="source_doc" name="source_doc" type="text" placeholder="ChauBan / UcTraiTap" />
      <br /><br />
      <button type="submit">Upload &amp; enqueue</button>
    </form>
    <p id="msg" class="muted"></p>
  </div>

  <div class="card">
    <h2 style="font-size:1.05rem">Jobs <button type="button" onclick="refresh()" style="font-size:0.75rem;padding:0.2rem 0.6rem">↻</button></h2>
    <table>
      <thead><tr><th>#</th><th>File</th><th>Status</th><th>Output</th></tr></thead>
      <tbody id="jobs"></tbody>
    </table>
  </div>

  <script>
    const form = document.getElementById('form');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = new FormData();
      data.append('file', document.getElementById('file').files[0]);
      data.append('source_doc', document.getElementById('source_doc').value);
      msg.textContent = 'Uploading…';
      try {
        const r = await fetch('/upload', { method: 'POST', body: data });
        const j = await r.json();
        msg.textContent = r.ok ? `Enqueued job #${j.job_id} (${j.filename}).` : `Error: ${j.detail}`;
        refresh();
      } catch (err) { msg.textContent = 'Upload failed: ' + err; }
    });

    async function refresh() {
      const r = await fetch('/jobs');
      const j = await r.json();
      const tbody = document.getElementById('jobs');
      tbody.innerHTML = '';
      for (const job of j.jobs) {
        const tr = document.createElement('tr');
        const out = job.status === 'done'
          ? `<a href="/jobs/${job.id}/output">download .jsonl</a>`
          : (job.status === 'failed' ? `<span class="muted">${job.error || 'failed'}</span>` : '—');
        tr.innerHTML = `<td>${job.id}</td><td>${job.filename}</td>` +
          `<td class="status ${job.status}">${job.status}</td><td>${out}</td>`;
        tbody.appendChild(tr);
      }
    }

    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
